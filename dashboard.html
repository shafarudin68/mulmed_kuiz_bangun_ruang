<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Quiz</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="card dashboard">

        <h1>📚 Dashboard Quiz</h1>

        <p class="welcome">
            Selamat datang,
            <strong>{{ student }}</strong>
        </p>

        <div class="info-box">

            <h3>Materi</h3>

            <p>Bangun Ruang Kubus dan Balok</p>

        </div>

        <div class="info-box">

            <h3>Total Soal</h3>

            <p>{{ total }} Soal</p>

        </div>

        <div class="info-box">

            <h3>Skor Maksimal</h3>

            <p>{{ total * 10 }}</p>

        </div>

        <a href="/start" class="btn">
            ▶ Mulai Quiz
        </a>

        <br><br>

        <a href="/logout" class="logout">
            Logout
        </a>

    </div>

</div>

</body>

</html>
